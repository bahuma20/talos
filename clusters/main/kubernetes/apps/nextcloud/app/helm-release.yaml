apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 15m
  chart:
    spec:
      chart: nextcloud
      version: 46.2.9
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: nextcloud
  values:
    TZ: Europe/Berlin
    podOptions:
      hostUsers: true
    credentials:
      b2:
        type: s3
        name: b2
        url: ${VOLSYNC_B2_URL}
        accessKey: ${VOLSYNC_B2_ACCESS_KEY}
        secretKey: ${VOLSYNC_B2_SECRET_KEY}
        bucket: ${VOLSYNC_B2_BUCKET}
        encrKey: ${VOLSYNC_ENCRYPTION_KEY}
        path: ""
      aws:
        type: s3
        name: aws
        url: "https://s3.eu-central-1.amazonaws.com"
        accessKey: ${AWS_ACCESS_KEY}
        secretKey: ${AWS_SECRET_KEY}
        bucket: "talos-cnpg-backups"
        encrKey: ${AWS_ENCRYPTION_KEY}
        path: ""
    cnpg:
      main:
        password: "${NEXTCLOUD_POSTGRES_PASSWORD}"
        cluster:
          instances: 1
          singleNode: true
        mode: standalone
        backups:
          enabled: true
          credentials: aws
          revision: "6"
          retentionPolicy: "2d"
        recovery:
          method: object_store
          credentials: aws
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: cloud.noitl.space
            paths:
            - path: /
              pathType: Prefix
        integrations:
          certManager:
            enabled: true
            certificateIssuer: ${CERTMANAGER_ISSUER}
          homepage:
            enabled: true
            group: Dateien
            widget:
              custom:
                key: "${NEXTCLOUD_NC_TOKEN}"
    nextcloud:
      collabora:
        enabled: true
        dictionaries:
          - de_DE
          - en_GB
          - en_US
        interface_mode: default
        password: "${NEXTCLOUD_COLLABORA_PASSWORD}"
      general:
        accessIP: ${NGINX_EXTERNAL_IP}
        default_phone_region: DE
        run_optimize: false
      expirations:
        trash_retention_obligation: 30, 60
    persistence:
      config:
        volsync:
          - name: app-config
            type: restic
            credentials: b2
            src:
              enabled: true
            dest:
              enabled: false
      data:
        type: nfs
        server: ${NFS_HOST}
        path: /mnt/pool1/Nextcloud
        readOnly: false
        autoPermissions:
          enabled: false
      html:
        volsync:
          - name: app-html
            type: restic
            credentials: b2
            src:
              enabled: true
            dest:
              enabled: false
    cronjobs:
      - name: delete-signal-in-trash
        enabled: true
        schedule: "30 * * * *"
        cmd:
          - 'URL="https://cloud.noitl.space"'
          - 'USER="bahuma20"'
          - 'PASS="${NEXTCLOUD_APP_PASSWORD}"'
          - 'TRASH_URL="$URL/remote.php/dav/trashbin/$USER/trash"'
          - 'curl -s -u "$USER:$PASS" -X PROPFIND "$TRASH_URL" | \'
          - grep -o '<d:href>[^<]*signal-[^<]*</d:href>' | \
          - sed 's/<d:href>\(.*\)<\/d:href>/\1/' | \
          - while read -r href; do
          - curl -s -u "$USER:$PASS" -X DELETE "$URL$href"
          - done
    resources:
      limits:
        cpu: 4
        memory: 3Gi
    securityContext:
      container:
        UMASK: "0022"
        runAsGroup: 568
        runAsUser: 568
      pod:
        fsGroupChangePolicy: OnRootMismatch