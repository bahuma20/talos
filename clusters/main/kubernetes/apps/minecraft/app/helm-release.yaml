apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: 15m
  chart:
    spec:
      chart: minecraft-java
      version: 35.33.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  values:
    TZ: Europe/Berlin
    podOptions:
      hostUsers: true
    webImage:
      repository: ghcr.io/bahuma20/noitl-craft
      tag: v0.7.0@sha256:b4cb1bec97f5a8903c1b810ede5863c9a4a0f5b7b7c1766817efbd8b4c403801
      pullPolicy: Always
    credentials:
      b2:
        type: s3
        name: b2
        url: ${VOLSYNC_B2_URL}
        accessKey: ${VOLSYNC_B2_ACCESS_KEY}
        secretKey: ${VOLSYNC_B2_SECRET_KEY}
        bucket: ${VOLSYNC_B2_BUCKET}
        encrKey: ${VOLSYNC_ENCRYPTION_KEY}
        path: ""
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${MINECRAFT_IP}
      livemap:
        enabled: true
        primary: false
        ports:
          livemap:
            enabled: true
            protocol: tcp
            port: 8123
            targetPort: 8123
        targetSelector: main
      metrics:
        enabled: true
        primary: false
        ports:
          z-metrics:
            enabled: true
            protocol: tcp
            port: 9940
            targetPort: 9940
        targetSelector: main
      web:
        enabled: true
        primary: false
        ports:
          main:
            enabled: true
            protocol: tcp
            port: 80
            targetPort: 8080
        targetSelector: web

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: craft.noitl.space
        targetSelector:
          web: main
        integrations:
          certManager:
            enabled: true
            certificateIssuer: ${CERTMANAGER_ISSUER}
          homepage:
            enabled: true
            group: Sonstiges
      livemap:
        enabled: true
        ingressClassName: external
        primary: false
        hosts:
          - host: craft-map.noitl.space
        targetSelector:
          livemap: livemap
        integrations:
          certManager:
            enabled: true
            certificateIssuer: ${CERTMANAGER_ISSUER}
          homepage:
            enabled: false
    serviceAccount:
      main:
        enabled: true
        primary: true
        targetSelectAll: true

    rbac:
      main:
        enabled: true
        primary: true
        clusterWide: true
        serviceAccounts:
          - main
        rules:
          - apiGroups: [ "" ]
            resources: [ "services" ]
            verbs: [ "watch","list" ]
          - apiGroups: [ "apps" ]
            resources: [ "statefulsets", "statefulsets/scale" ]
            verbs: [ "watch","list","get","update","patch" ]

    persistence:
      data:
        targetSelector:
          main:
            main:
              mountPath: /data
        volsync:
          - name: data
            type: restic
            credentials: b2
            src:
              enabled: true
            dest:
              enabled: false
      web-var:
        enabled: true
        type: "emptyDir"
        medium: Memory
        size: 150Mi
        targetSelector:
          web:
            main:
              mountPath: /var/www/html/var
              readOnly: false
      web-symfony:
        enabled: true
        type: "emptyDir"
        medium: Memory
        size: 150Mi
        targetSelector:
          web:
            main:
              mountPath: /.symfony5
              readOnly: false

    workload:
      main:
        type: StatefulSet
        replicas: 0
        podSpec:
          containers:
            main:
              env:
                TYPE: "PAPER"
                VERSION: "1.21.11"
                PAPER_BUILD: "88"
                MOTD: "Happy Noitln und Craften"
                SERVER_NAME: "Noitl.Craft"
                ENABLE_WHITELIST: true
                RCON_PASSWORD: ${MINECRAFT_RCON_PASSWORD}
                PVP: true
                MAX_WORLD_SIZE: ""
                MEMORY: 6G
      web:
        enabled: true
        primary: false
        type: Deployment
        podSpec:
          automountServiceAccountToken: true
          terminationGracePeriodSeconds: 5
          containers:
            main:
              enabled: true
              primary: true
              imageSelector: webImage
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
              env:
                APP_ENV: prod
                APP_SECRET: ${MINECRAFT_WEB_SECRET}
                APP_KUBERNETES_NAMESPACE: minecraft
                APP_KUBERNETES_STATEFULSET_NAME: minecraft-minecraft-java
                APP_MINECRAFT_SERVER_ADDRESS: minecraft-minecraft-java.minecraft.svc.cluster.local
                APP_MINECRAFT_SERVER_PORT: 25565
    metrics:
      main:
        enabled: true
        type: servicemonitor
        endpoints:
          - port: z-metrics
            path: /metrics
        targetSelector: main
    resources:
      limits:
        cpu: 4
        memory: 8Gi
      pod:
        fsGroupChangePolicy: OnRootMismatch