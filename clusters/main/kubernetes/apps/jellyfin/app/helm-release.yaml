apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: 23.6.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 10m0s
  upgrade:
    remediation:
      retries: 3
  values:
    TZ: Europe/Berlin
    autodiscovery:
      enabled: true
    credentials:
      b2:
        type: s3
        name: b2
        url: ${VOLSYNC_B2_URL}
        accessKey: ${VOLSYNC_B2_ACCESS_KEY}
        secretKey: ${VOLSYNC_B2_SECRET_KEY}
        bucket: ${VOLSYNC_B2_BUCKET}
        encrKey: ${VOLSYNC_ENCRYPTION_KEY}
        path: ""
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: 192.168.188.205
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                JELLYFIN_PublishedServerUrl: "http://192.168.188.205:8096"
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: jellyfin.${BASE_DOMAIN}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: ${CERTMANAGER_ISSUER}
          homepage:
            enabled: true
            group: Medien
            description: "Filme und Serien streamen"
            widget:
              custom:
                key: "${JELLYFIN_HOMEPAGE_API_KEY}"
                enableBlocks: 'true'
                fields: '["movies", "series", "episodes"]'
    persistence:
      config:
        volsync:
          - name: config
            type: restic
            credentials: b2
            src:
              enabled: true
            dest:
              enabled: false
      data:
        volsync:
          - name: data
            type: restic
            credentials: b2
            src:
              enabled: true
            dest:
              enabled: false
      library-filme:
        enabled: true
        type: nfs
        server: ${NFS_HOST}
        path: /mnt/pool1/Medien/Filme
        mountPath: /mnt/nas/filme
        readOnly: true
        autoPermissions:
          enabled: false
      library-serien:
        enabled: true
        type: nfs
        server: ${NFS_HOST}
        path: /mnt/pool1/Medien/Serien
        mountPath: /mnt/nas/serien
        readOnly: true
        autoPermissions:
          enabled: false
    resources: {}
    securityContext:
      container:
        UMASK: "0022"
        readOnlyRootFilesystem: false
        runAsGroup: 568
        runAsUser: 568
